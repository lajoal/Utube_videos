name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run self-check
        run: python self_check.py

      - name: Publish workflow summary
        if: always()
        run: |
          echo "## Reporting Artifact" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/reporting_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reporting artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporting-output
          path: artifacts/
          if-no-files-found: error
